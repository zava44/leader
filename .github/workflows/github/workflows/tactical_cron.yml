name: Tactical Alert Cron

on:
  schedule:
    # 08:45 UTC corrisponde alle 10:45 italiane (con ora legale +2)
    - cron: '45 8 * * *'
  workflow_dispatch:

jobs:
  ping_server:
    runs-on: ubuntu-latest
    steps:
      - name: Bussata al server Altervista
        run: |
          curl -s "https://tuosito.altervista.org/cron_telegram.php?key=SVEGLIA_TACTICAL_2026"
