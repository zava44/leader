name: Controllo Giornaliero Multipli 5 Settimane

on:
  schedule:
    # Gira TUTTI I GIORNI alle 10:00 (ora italiana circa)
    - cron: '0 9 * * *'
  workflow_dispatch: # Ti permette di provarlo a mano quando vuoi

jobs:
  ping-website:
    runs-on: ubuntu-latest
    steps:
      - name: Chiamata allo script su Altervista
        run: |
          curl -s https://fantaranking.altervista.org/cron_check.php
